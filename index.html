<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issues Tracker | Login</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
  <!-- <link rel="stylesheet" href="style.css"> -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<style>
  
* {
  font-family: "Outfit", sans-serif;

}
</style>
</head>
<!--  -->

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white w-full max-w-md mx-auto p-8 rounded-xl shadow-lg text-center">

  <div class="card my-auto">
  <div class="logo">
    <img src="./assets/github-logo.png" alt="" class="mx-auto">
    <div class="text-center my-4">
    <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
    <p class="text-lg text-gray-500">Sign in to manage your issues</p>    </div>
   
  </div>

<div>
<fieldset class="fieldset  border-base-300 rounded-box  p-4 mx-auto">
  

  <label class="label text-lg text-black">Username</label>
  <input id="un" type="text" class="input w-full" placeholder="Enter Username" />
  <span class="text-left text-primary">Default: admin</span>

  <label class="label text-lg text-black">Password</label>
  <input id = "pw" type="password" class="input w-full" placeholder="Enter Password" />
  <span class="text-left text-primary">Default: admin123</span>

  <button id="login-btn" class="btn btn-primary mt-4">Login</button>

  <div class="flex items-center mt-2">
  <div class="flex-grow border-t border-gray-300"></div>
  <span class="px-3 text-gray-400 text-sm">OR</span>
  <div class="flex-grow border-t border-gray-300"></div>
</div>
</fieldset>
</div>

<div class="text-sm space-y-3">
    <p class="text-gray-500">Demo Credentials:</p>
    <div class="bg-slate-100 rounded-lg p-6">
        <p><span class="text-black font-bold">Username: </span>admin</p>
        <p><span class="text-black font-bold">Password </span>admin123</p>
    </div>
</div>


</div>
</div>

   <script src="login.js"></script>
</body>
</html>
